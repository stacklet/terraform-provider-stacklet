name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  lint:
    name: lint
    uses: ./.github/workflows/_run-just.yaml
    with:
      just-command: lint
      full-git-history: true  # copyright headers need it

  test:
    name: test
    uses: ./.github/workflows/_run-just.yaml
    with:
      just-command: test
